<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="cache-control" content="no-store">
  <title>basic control page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <style>
	body { background: #222; }
  .container {
    max-width: 400px;
		margin-top: 10%;
		padding: 1em;
		background: rgba(50,50,50,0.5);
		border-radius: 10px;
  }

	button.a {
		background: #07a4e5;
		color: #fff;
		border: 1px solid #07a4e5;
	}

	button.b {
		background: #e58207;
		color: #fff;
		border: 1px solid #e58207;
	}

	.a:hover {
		color: #fff;
		border: 1px solid #07a4e5;
		opacity: 0.9;
	}

	.b:hover {
		color: #fff;
		border: 1px solid #e58207;
		opacity: 0.9;
	}
  </style>
</head>
<body>
<div class="container">
	<div class="row">
		<input class="u-full-width" type="password" placeholder="password">
	</div>
	<div class="row">
		<button class="button a u-full-width"> login </button>
	</div>
	<div class="row">
		<button class="button b u-full-width"> pay </button>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/gh/OutCast3k/coinbin/js/crypto-sha256.js"></script>
<script>
	const	t = "e0544a80a086d6c1e61766a4a451bbeeb53a03bac201f4c9fff9c9c9cc694b30",
				p = Crypto.SHA256(localStorage.getItem('token') || ''),
				a = atob('Yi5odG1s');

	if ( p === t) {
		window.location.assign(a);
	}

	document.querySelector('button.a').addEventListener('click', e => {
		login();
	});

	document.querySelector('button.b').addEventListener('click', e => {
		location.assign(atob('cC5odG1s'));
	});

	document.addEventListener('keyup', e => {
		if ( e.keyCode !== 13 ) {
			return;
		}

		login();		
	});

	function login() {
		let x = document.querySelector('input').value,
				s = Crypto.SHA256(x);

		if ( Crypto.SHA256(s) === t ) {
			localStorage.setItem('token', s);
			window.location.assign(a);
			return;
		}

		console.log('invalid token');
	}

	function newbg() {
		var src = `/images/random/${innerWidth}/${innerHeight}?grayscale`;

		fetch(src)
		.then(x => x.blob())
		.then(o => {
			var f = new FileReader();

			f.onload = x => {
				document.body.style.background = `center no-repeat fixed url(${f.result}) rgb(56,56,56)`;
				setTimeout(newbg, Math.ceil(Math.random() * 1000 ) * 100);
			}

			f.readAsDataURL(o);
		});
	}

	document.addEventListener('DOMContentLoaded', newbg);
</script>
</body>
</html>
